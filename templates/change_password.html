<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 변경 - 연결 재무보고 통합 시스템</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  body {
    background: #f0f4f8;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    width: 100%;
    max-width: 440px;
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(31,56,100,0.13);
  }
  .card-header {
    background: linear-gradient(135deg, #1F3864 0%, #2d5aa0 100%);
    border-radius: 16px 16px 0 0 !important;
    padding: 1.5rem 2rem;
    color: white;
  }
  .card-body { padding: 2rem; }
  .btn-primary {
    background: linear-gradient(135deg, #1F3864 0%, #2d5aa0 100%);
    border: none;
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    font-weight: 600;
  }
  .btn-primary:hover { opacity: 0.9; }
  .form-control:focus { border-color: #1F3864; box-shadow: 0 0 0 0.2rem rgba(31,56,100,0.15); }
</style>
</head>
<body>
<div class="card">
  <div class="card-header d-flex align-items-center gap-2">
    <i class="bi bi-key-fill fs-5"></i>
    <span class="fw-bold" data-i18n="cpw.title">비밀번호 변경</span>
    <div class="ms-auto d-flex align-items-center gap-2">
      <div class="d-flex border border-light rounded-pill overflow-hidden" style="gap:1px;">
        <button type="button" class="btn btn-sm lang-btn border-0" data-lang="ko">한국어</button>
        <button type="button" class="btn btn-sm lang-btn border-0" data-lang="en">English</button>
      </div>
      <a href="/" class="text-white text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i><span data-i18n="cpw.main">메인으로</span>
      </a>
    </div>
  </div>
  <div class="card-body">
    {% if msg %}
    <div class="alert alert-success d-flex align-items-center gap-2 py-2">
      <i class="bi bi-check-circle-fill"></i><span>{{ msg }}</span>
    </div>
    {% endif %}
    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
      <i class="bi bi-exclamation-circle-fill"></i><span>{{ error }}</span>
    </div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold" data-i18n="cpw.cur">현재 비밀번호</label>
        <input type="password" name="current_password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold"><span data-i18n="cpw.new">새 비밀번호</span> <small class="text-muted fw-normal" data-i18n="cpw.new_hint">(6자 이상)</small></label>
        <input type="password" name="new_password" class="form-control" required minlength="6">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" data-i18n="cpw.confirm">새 비밀번호 확인</label>
        <input type="password" name="confirm_password" class="form-control" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-lg me-2"></i><span data-i18n="cpw.save">변경 저장</span>
      </button>
    </form>
  </div>
</div>
{% include '_i18n.html' %}
</body>
</html>
