  let lang = localStorage.getItem('lang') || 'ko';

  function t(key, ...args) {
    const tbl = DICT[lang] || DICT.ko;
    const fn = (tbl._fn || {})[key] || (DICT.ko._fn || {})[key];
    if (typeof fn === 'function') return fn(...args);
    const v = tbl[key];
    if (v != null) return v;
    return (DICT.ko[key] != null) ? DICT.ko[key] : key;
  }

  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = t(el.getAttribute('data-i18n'));
      if (typeof v === 'string') el.textContent = v;
    });
    document.querySelectorAll('[data-i18n-ph]').forEach(el => {
      const v = t(el.getAttribute('data-i18n-ph'));
      if (typeof v === 'string') el.setAttribute('placeholder', v);
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });
    document.documentElement.lang = lang;
  }

  function setLanguage(l) {
    lang = l;
    localStorage.setItem('lang', l);
    applyI18n();
    if (typeof window.onI18nChange === 'function') {
      try { window.onI18nChange(lang); } catch (e) { /* page hook 오류 무시 */ }
    }
  }

  // 전역 노출 (페이지 스크립트에서 t()/getLang() 사용)
  window.t = t;
  window.getLang = () => lang;
  window.applyI18n = applyI18n;
  window.setLanguage = setLanguage;

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });
    applyI18n();
  });
})();
