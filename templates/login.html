<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 - 연결 재무보고 통합 시스템</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  body {
    background: #f0f4f8;
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    border: none;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(31,56,100,0.13);
  }
  .login-header {
    background: linear-gradient(135deg, #1F3864 0%, #2d5aa0 100%);
    border-radius: 16px 16px 0 0;
    padding: 2rem;
    text-align: center;
    color: white;
  }
  .login-header .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .login-header h5 { margin: 0; font-size: 1.1rem; opacity: 0.9; }
  .login-body { padding: 2rem; }
  .btn-login {
    background: linear-gradient(135deg, #1F3864 0%, #2d5aa0 100%);
    border: none;
    color: white;
    width: 100%;
    padding: 0.75rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .btn-login:hover { opacity: 0.9; color: white; }
  .form-control:focus { border-color: #1F3864; box-shadow: 0 0 0 0.2rem rgba(31,56,100,0.15); }
  .login-header { position: relative; }
  .login-lang { position: absolute; top: 12px; right: 12px; }
</style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <div class="login-lang d-flex border border-light rounded-pill overflow-hidden" style="gap:1px;">
      <button type="button" class="btn btn-sm lang-btn border-0" data-lang="ko">한국어</button>
      <button type="button" class="btn btn-sm lang-btn border-0" data-lang="en">English</button>
    </div>
    <div class="icon"><i class="bi bi-bar-chart-line-fill"></i></div>
    <h4 class="mb-1" data-i18n="app.title">연결 재무보고 통합 시스템</h4>
    <h5 data-i18n="login.sub">로그인</h5>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold" data-i18n="login.user">아이디</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="아이디 입력" data-i18n-ph="login.user_ph" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" data-i18n="login.pw">비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" data-i18n-ph="login.pw_ph" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i><span data-i18n="login.btn">로그인</span>
      </button>
    </form>
  </div>
</div>
{% include '_i18n.html' %}
</body>
</html>
