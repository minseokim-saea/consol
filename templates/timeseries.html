<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시계열 분석 — 연결 재무보고 시스템</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --brand-900:#1F3864; --brand-700:#2F5597; --brand-500:#4472C4; --brand-050:#EBF0FA;
  --surface:#f0f4f8; --card-bg:#fff; --text-body:#1a202c; --text-muted:#6c757d;
  --border:#dee2e6;
}
@media (prefers-color-scheme: dark) {
  :root { --brand-900:#4472C4; --brand-700:#5A8DD6; --brand-500:#6FA1E0; --brand-050:#1a2942;
          --surface:#0f172a; --card-bg:#1e293b; --text-body:#e2e8f0; --text-muted:#94a3b8;
          --border:#334155; }
  body { color-scheme: dark; }
  .card { background:var(--card-bg); color:var(--text-body); }
  .form-select, .form-control { background:#0f172a; color:var(--text-body); border-color:var(--border); }
  .table-light, thead.table-light { --bs-table-bg:#2a3548; color:var(--text-body); }
  .text-muted { color:var(--text-muted) !important; }
}
body { background:var(--surface); color:var(--text-body);
       font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif; }
.navbar { background:var(--brand-900) !important; }
.section-card { border-radius:10px; border:none; box-shadow:0 1px 6px rgba(0,0,0,0.08); background:var(--card-bg); }
.ts-table { font-variant-numeric:tabular-nums; }
.ts-table th, .ts-table td { white-space:nowrap; }
.ts-table thead th { background:var(--brand-900); color:#fff; text-align:center; vertical-align:middle; }
.ts-table tbody th { background:var(--brand-050); color:var(--brand-900); font-weight:600; text-align:left; position:sticky; left:0; }
.ts-table td { text-align:right; }
.ts-table tr.ts-derived td, .ts-table tr.ts-derived th { background:#fffdf3; }
@media (prefers-color-scheme: dark){ .ts-table tr.ts-derived td, .ts-table tr.ts-derived th { background:#26314a; } }
.ts-table tr.ts-ebitda th, .ts-table tr.ts-ebitda td { font-weight:700; }
.ts-blank { color:var(--text-muted); }
.unit-badge { background:#fff3cd; color:#664d03; padding:3px 10px; border-radius:6px;
              font-size:0.85rem; font-weight:600; display:inline-block; }
</style>
</head>
<body>

{% set active_menu = 'timeseries' %}
{% include '_sidebar.html' %}

{% include '_topbar.html' %}

<div class="container-fluid mt-3">

  <!-- 선택 -->
  <div class="card section-card mb-3">
    <div class="card-body d-flex align-items-center gap-3 flex-wrap">
      <label class="fw-bold mb-0"><i class="bi bi-diagram-3"></i> 연결그룹</label>
      <select id="groupSelect" class="form-select" style="max-width:260px">
        <option value="">— 그룹 선택 —</option>
      </select>
      <label class="fw-bold mb-0 ms-3"><i class="bi bi-calendar3"></i> 시작 결산기간</label>
      <select id="startSelect" class="form-select" style="max-width:150px">
        {% for y in options %}
        <option value="{{ y }}" {% if y == default_start %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
      <label class="fw-bold mb-0"><i class="bi bi-arrow-right"></i> 종료 결산기간</label>
      <select id="endSelect" class="form-select" style="max-width:150px">
        {% for y in options %}
        <option value="{{ y }}" {% if y == default_end %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
      <button class="btn btn-primary" onclick="loadSeries()">
        <i class="bi bi-arrow-clockwise"></i> 새로고침
      </button>
      <button id="downloadBtn" class="btn btn-outline-success" onclick="downloadExcel()">
        <i class="bi bi-file-earmark-excel"></i> 엑셀 다운로드
      </button>
      <span class="unit-badge ms-auto">단위: 억원 (비율 제외)</span>
    </div>
  </div>

  <div class="alert alert-info py-2 small mb-3">
    <i class="bi bi-info-circle"></i>
    각 열은 <strong>해당 결산분기</strong> 기준입니다. 분기 결산(1Q·2Q·3Q)의 손익 항목은 <strong>연환산</strong>되며, 재무상태표 항목은 분기말 잔액 그대로입니다.
  </div>

  <!-- 본문 (표) -->
  <div id="seriesBody">
    <div class="card section-card">
      <div class="card-body text-center text-muted py-5">
        <i class="bi bi-hourglass-split fs-1 d-block mb-2"></i>
        불러오는 중…
      </div>
    </div>
  </div>

  <!-- 그래프 (하단) -->
  <div id="chartCard" class="row g-3 mt-0" style="display:none">
    <div class="col-12 col-xl-6">
      <div class="card section-card h-100">
        <div class="card-body">
          <h6 class="fw-bold mb-3"><i class="bi bi-bar-chart-line"></i> 수익성
            <span class="text-muted small fw-normal">— 막대: 매출액·영업이익(억원) / 선: 영업이익률(%)</span>
          </h6>
          <div style="position:relative; height:340px;">
            <canvas id="tsChartProfit"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-xl-6">
      <div class="card section-card h-100">
        <div class="card-body">
          <h6 class="fw-bold mb-3"><i class="bi bi-bar-chart-line"></i> 차입 / 재무구조
            <span class="text-muted small fw-normal">— 막대: 차입금(억원) / 선: 부채비율(%)</span>
          </h6>
          <div style="position:relative; height:340px;">
            <canvas id="tsChartDebt"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// 초기 기본 그룹(글로벌세아 등) — 없으면 빈 문자열
const DEFAULT_GROUP_ID = "{{ group_id }}";

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// 접근 가능한 연결그룹 목록을 불러와 셀렉터를 채운다.
async function loadGroups() {
  const sel = document.getElementById('groupSelect');
  const period = document.getElementById('endSelect').value;
  try {
    const r = await fetch('/consolidation/groups?year=' + encodeURIComponent(period));
    const j = await r.json();
    const cur = sel.value || DEFAULT_GROUP_ID;
    sel.innerHTML = '<option value="">— 그룹 선택 —</option>' +
      (j.groups || []).map(g =>
        `<option value="${g.id}" ${g.id === cur ? 'selected' : ''}>${escapeHtml(g.name)}</option>`).join('');
  } catch (e) {
    sel.innerHTML = '<option value="">그룹 목록 로드 실패</option>';
  }
}

// 금액: 원 → 억원
function fmtAmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '<span class="ts-blank">–</span>';
  const v = Number(n) / 1e8;
  const abs = Math.abs(v);
  const digits = abs < 10 ? 1 : 0;
  const s = abs.toLocaleString('ko-KR', {maximumFractionDigits: digits, minimumFractionDigits: digits});
  return v < 0 ? '-' + s : s;
}
// 부채비율(%)
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '<span class="ts-blank">–</span>';
  return (Number(n) * 100).toLocaleString('ko-KR', {maximumFractionDigits: 1, minimumFractionDigits: 1}) + '%';
}
// 이자보상비율(배)
function fmtX(n) {
  if (n === null || n === undefined || isNaN(n)) return '<span class="ts-blank">–</span>';
  return Number(n).toLocaleString('ko-KR', {maximumFractionDigits: 2, minimumFractionDigits: 2}) + '배';
}

// 표 행 정의: [key, 라벨, 포맷터, 추가 tr 클래스]
const ROWS = [
  ['sales',      '매출액',        fmtAmt, ''],
  ['op',         '영업이익',      fmtAmt, ''],
  ['op_margin',  '영업이익률',    fmtPct, 'ts-derived'],
  ['amort',      '상각비',        fmtAmt, ''],
  ['ni',         '당기순이익',    fmtAmt, ''],
  ['ebitda',     'EBITDA',        fmtAmt, 'ts-derived ts-ebitda'],
  ['debt_total', '총차입금',      fmtAmt, ''],
  ['cash',       '현금성자산',    fmtAmt, ''],
  ['net_debt',   'Net Debt',      fmtAmt, 'ts-derived'],
  ['interest',   '이자비용',      fmtAmt, ''],
  ['assets',     '총자산',        fmtAmt, ''],
  ['liab',       '총부채',        fmtAmt, ''],
  ['equity',     '총자본',        fmtAmt, ''],
  ['debt_ratio', '부채비율',      fmtPct, 'ts-derived'],
  ['icr',        '이자보상비율',  fmtX,   'ts-derived'],
];

function render(cols) {
  let h = '<div class="card section-card"><div class="card-body p-0"><div class="table-responsive">';
  h += '<table class="table table-sm table-bordered ts-table mb-0"><thead><tr><th style="min-width:130px">구분</th>';
  cols.forEach(c => {
    const sub = c.has_data ? `<div class="small opacity-75">${c.period}</div>`
                           : `<div class="small opacity-75">데이터 없음</div>`;
    h += `<th style="min-width:110px">${c.label}${sub}</th>`;
  });
  h += '</tr></thead><tbody>';
  ROWS.forEach(([key, label, fmt, cls]) => {
    h += `<tr class="${cls}"><th>${label}</th>`;
    cols.forEach(c => {
      const v = c.has_data ? (c.metrics ? c.metrics[key] : null) : null;
      h += `<td>${c.has_data ? fmt(v) : '<span class="ts-blank">–</span>'}</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table></div></div></div>';
  document.getElementById('seriesBody').innerHTML = h;
}

// ── 추이 그래프 ──────────────────────────────────────────────
if (window.ChartDataLabels) { Chart.register(window.ChartDataLabels); }

// 차트 정의: canvas id + 막대(억원, 좌축) / 선(%, 우축) 항목
const CHART_DEFS = {
  profit: {
    canvas: 'tsChartProfit',
    bars:  [['sales', '매출액', '#4472C4'], ['op', '영업이익', '#70AD47']],
    lines: [['op_margin', '영업이익률', '#7030A0']],
  },
  debt: {
    canvas: 'tsChartDebt',
    bars:  [['debt_total', '차입금', '#ED7D31']],
    lines: [['debt_ratio', '부채비율', '#C00000']],
  },
};
const tsCharts = { profit: null, debt: null };

function buildChartConfig(cols, def, theme) {
  const labels = cols.map(c => c.label);
  const amt = (c, k) => (c.has_data && c.metrics && c.metrics[k] != null) ? c.metrics[k] / 1e8 : null;  // 억원
  const pct = (c, k) => (c.has_data && c.metrics && c.metrics[k] != null) ? c.metrics[k] * 100 : null;  // %

  const datasets = [];
  def.bars.forEach(([key, label, color]) => {
    datasets.push({
      type: 'bar', label, yAxisID: 'yAmt', order: 2,
      backgroundColor: color + 'cc', borderColor: color, borderWidth: 1,
      data: cols.map(c => amt(c, key)),
      datalabels: {
        anchor: 'center', align: 'center', color: '#fff', font: { size: 10, weight: '700' },
        formatter: v => (v == null) ? '' : Math.round(v).toLocaleString('ko-KR'),
      },
    });
  });
  def.lines.forEach(([key, label, color]) => {
    datasets.push({
      type: 'line', label, yAxisID: 'yPct', order: 1,
      borderColor: color, backgroundColor: color, borderWidth: 2,
      pointRadius: 3, pointHoverRadius: 5, tension: 0.25, spanGaps: true,
      data: cols.map(c => pct(c, key)),
      datalabels: {
        anchor: 'end', align: 'top', color: color, font: { size: 10, weight: '700' },
        formatter: v => (v == null) ? '' : v.toFixed(1) + '%',
      },
    });
  });

  return {
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
      layout: { padding: { top: 18 } },
      plugins: {
        legend: { labels: { color: theme.tick } },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const v = ctx.parsed.y;
              if (v == null) return ctx.dataset.label + ': –';
              const isPct = ctx.dataset.yAxisID === 'yPct';
              const s = v.toLocaleString('ko-KR', { maximumFractionDigits: isPct ? 1 : 0 });
              return ctx.dataset.label + ': ' + s + (isPct ? '%' : ' 억원');
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: theme.tick }, grid: { color: theme.grid } },
        yAmt: { position: 'left', title: { display: true, text: '억원', color: theme.tick },
                ticks: { color: theme.tick, callback: v => v.toLocaleString('ko-KR') }, grid: { color: theme.grid } },
        yPct: { position: 'right', title: { display: true, text: '%', color: theme.tick },
                ticks: { color: theme.tick, callback: v => v + '%' }, grid: { drawOnChartArea: false } },
      },
    },
  };
}

function renderChart(cols) {
  const card = document.getElementById('chartCard');
  if (!cols || !cols.some(c => c.has_data)) { hideChart(); return; }
  card.style.display = '';

  const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = {
    tick: isDark ? '#cbd5e1' : '#475569',
    grid: isDark ? 'rgba(148,163,184,0.18)' : 'rgba(0,0,0,0.06)',
  };

  Object.keys(CHART_DEFS).forEach(name => {
    const def = CHART_DEFS[name];
    const cfg = buildChartConfig(cols, def, theme);
    if (tsCharts[name]) {
      tsCharts[name].data = cfg.data;
      tsCharts[name].options = cfg.options;
      tsCharts[name].update();
    } else {
      tsCharts[name] = new Chart(document.getElementById(def.canvas), cfg);
    }
  });
}

function hideChart() {
  document.getElementById('chartCard').style.display = 'none';
  Object.keys(tsCharts).forEach(name => {
    if (tsCharts[name]) { tsCharts[name].destroy(); tsCharts[name] = null; }
  });
}

function loadSeries() {
  const start = document.getElementById('startSelect').value;
  const end = document.getElementById('endSelect').value;
  const gid = document.getElementById('groupSelect').value;
  const body = document.getElementById('seriesBody');
  if (!gid) {
    hideChart();
    body.innerHTML = '<div class="card section-card"><div class="card-body text-center text-muted py-5">'
      + '<i class="bi bi-diagram-3 fs-1 d-block mb-2"></i>연결그룹을 선택해 주세요.</div></div>';
    return;
  }
  if (start && end && start > end) {
    hideChart();
    body.innerHTML = '<div class="card section-card"><div class="card-body text-center text-danger py-5">'
      + '<i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i>종료 결산기간이 시작 결산기간보다 빠릅니다.</div></div>';
    return;
  }
  body.innerHTML = '<div class="card section-card"><div class="card-body text-center text-muted py-5">'
    + '<div class="spinner-border text-primary mb-2"></div><div>계산 중… (분기별 연결 실행)</div></div></div>';
  fetch(`/timeseries/${gid}/data?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`)
    .then(r => r.json())
    .then(d => {
      if (!d.ok) {
        hideChart();
        body.innerHTML = `<div class="card section-card"><div class="card-body text-center text-danger py-5">`
          + `<i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i>${d.error || '오류'}</div></div>`;
        return;
      }
      render(d.columns || []);
      renderChart(d.columns || []);
    })
    .catch(e => {
      hideChart();
      body.innerHTML = `<div class="card section-card"><div class="card-body text-center text-danger py-5">`
        + `<i class="bi bi-exclamation-triangle fs-1 d-block mb-2"></i>요청 실패: ${e}</div></div>`;
    });
}

// 현재 선택(그룹·시작·종료)으로 엑셀 다운로드.
function downloadExcel() {
  const start = document.getElementById('startSelect').value;
  const end = document.getElementById('endSelect').value;
  const gid = document.getElementById('groupSelect').value;
  if (!gid) { alert('연결그룹을 먼저 선택해 주세요.'); return; }
  if (start && end && start > end) { alert('종료 결산기간이 시작 결산기간보다 빠릅니다.'); return; }
  const url = `/timeseries/${gid}/download?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;
  window.location.href = url;
}

document.getElementById('groupSelect').addEventListener('change', loadSeries);
document.getElementById('startSelect').addEventListener('change', loadSeries);
document.getElementById('endSelect').addEventListener('change', () => loadGroups().then(loadSeries));
document.addEventListener('DOMContentLoaded', () => loadGroups().then(loadSeries));
</script>
</body>
</html>
