<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2단계 인증 - 연결 재무보고 통합 시스템</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  body { background:#f0f4f8; font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
         display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-card { width:100%; max-width:420px; border:none; border-radius:16px;
                box-shadow:0 8px 32px rgba(31,56,100,0.13); }
  .login-header { position:relative; background:linear-gradient(135deg,#1F3864 0%,#2d5aa0 100%);
                  border-radius:16px 16px 0 0; padding:2rem; text-align:center; color:#fff; }
  .login-header .icon { font-size:2.5rem; margin-bottom:0.5rem; }
  .login-header h5 { margin:0; font-size:1.05rem; opacity:0.9; }
  .login-body { padding:2rem; }
  .login-lang { position:absolute; top:12px; right:12px; }
  .otp-input { letter-spacing:0.5em; text-align:center; font-size:1.4rem; font-weight:700; }
  .btn-login { background:linear-gradient(135deg,#1F3864 0%,#2d5aa0 100%); border:none; color:#fff;
               width:100%; padding:0.75rem; border-radius:8px; font-weight:600; }
  .btn-login:hover { opacity:0.9; color:#fff; }
</style>
</head>
<body>
<div class="login-card card">
  <div class="login-header">
    <div class="login-lang d-flex border border-light rounded-pill overflow-hidden" style="gap:1px;">
      <button type="button" class="btn btn-sm lang-btn border-0" data-lang="ko">한국어</button>
      <button type="button" class="btn btn-sm lang-btn border-0" data-lang="en">English</button>
    </div>
    <div class="icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h4 class="mb-1" data-i18n="tfa.login_title">2단계 인증</h4>
    <h5 data-i18n="tfa.login_desc">인증 앱(Google Authenticator 등)에 표시된 6자리 코드를 입력하세요.</h5>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
      <i class="bi bi-exclamation-circle-fill"></i><span>{{ error }}</span>
    </div>
    {% endif %}
    <form method="POST" autocomplete="off">
      <div class="mb-4">
        <label class="form-label fw-semibold" data-i18n="tfa.code">인증 코드</label>
        <input type="text" name="otp" class="form-control otp-input" inputmode="numeric"
               pattern="[0-9]*" maxlength="6" placeholder="······" data-i18n-ph="tfa.code_ph"
               required autofocus>
      </div>
      <button type="submit" class="btn btn-login">
        <i class="bi bi-check-lg me-2"></i><span data-i18n="tfa.verify">확인</span>
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="/logout" class="text-muted small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i><span data-i18n="tfa.back_login">로그인으로 돌아가기</span>
      </a>
    </div>
  </div>
</div>
{% include '_i18n.html' %}
</body>
</html>
