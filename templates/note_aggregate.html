<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주석 합산 - 연결 재무보고 통합 시스템</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body { background:#f0f4f8; font-family:'Pretendard','Malgun Gothic',Arial,sans-serif; }
  .navbar { background:#1F3864 !important; }
  .card { border:none; border-radius:12px; box-shadow:0 2px 12px rgba(31,56,100,0.08); }
  .card-header {
    background:linear-gradient(135deg,#1F3864 0%, #2d5aa0 100%);
    color:#fff; border-radius:12px 12px 0 0 !important;
    padding:0.85rem 1.25rem; font-weight:600;
  }
  .agg-card { cursor:pointer; transition: all .15s ease; border:1px solid #dde4ec; }
  .agg-card:hover { box-shadow:0 6px 20px rgba(31,56,100,0.15); border-color:#2d5aa0; }
  .agg-card.active { background:#EBF0FA; border-color:#1F3864; }
  /* ── 그룹 사이드바 + 항목 카드 그리드 ───────────────── */
  .agg-layout { display:flex; align-items:stretch; }
  .sheet-tabs {
    flex:0 0 212px; width:212px; display:flex; flex-direction:column;
    gap:2px; padding:14px 10px; margin:0;
    border-right:2px solid #e5ebf3; background:#fafcff;
    border-radius:0 0 0 12px;
  }
  .sheet-tabs .nav-section {
    list-style:none; font-size:.67rem; font-weight:700; letter-spacing:.05em;
    color:#9aa9bd; text-transform:uppercase; padding:12px 12px 4px;
  }
  .sheet-tabs .nav-section:first-child { padding-top:2px; }
  .sheet-tabs .nav-item { width:100%; }
  .sheet-tabs .nav-link {
    display:flex; align-items:center; width:100%; text-align:left;
    border:none; border-radius:8px; color:#3d4a5c; font-weight:600;
    padding:9px 12px; font-size:.85rem; background:none;
  }
  .sheet-tabs .nav-link i { width:1.1rem; flex-shrink:0; }
  .sheet-tabs .nav-link:hover { background:#eef3fb; color:#1F3864; }
  .sheet-tabs .nav-link.active { background:#1F3864; color:#fff; }
  .sheet-tabs .nav-link .badge {
    margin-left:auto; background:#e3e9f2; color:#1F3864;
    font-size:.7rem; font-weight:700;
  }
  .sheet-tabs .nav-link.active .badge { background:rgba(255,255,255,.25); color:#fff; }

  .sheet-tab-content { flex:1 1 auto; min-width:0; padding:16px 18px; }
  .agg-list-group {
    display:grid; gap:10px;
    grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
  }
  .agg-item {
    display:flex; align-items:flex-start; gap:12px; height:100%;
    padding:12px 14px; border:1px solid #e1e8f1; border-radius:10px;
    background:#fff; cursor:pointer; transition: all .12s ease;
    text-align:left; width:100%;
  }
  .agg-item:hover { border-color:#2d5aa0; box-shadow:0 3px 12px rgba(31,56,100,.10); }
  .agg-item.active { border-color:#1F3864; background:#EBF0FA; box-shadow:0 3px 12px rgba(31,56,100,.15); }
  .agg-item .agg-key {
    background:#1F3864; color:#fff; font-weight:700; font-family:monospace;
    border-radius:6px; padding:3px 8px; font-size:.74rem; min-width:40px;
    text-align:center; flex-shrink:0;
  }
  .agg-item.active .agg-key { background:#a05a00; }
  .agg-item .agg-icon { display:none; }
  .agg-item .agg-title { font-weight:600; color:#1F3864; font-size:.9rem; line-height:1.3; }
  .agg-item .agg-desc  { color:#6c757d; font-size:.76rem; margin-top:3px; line-height:1.35; }

  @media (max-width: 900px) {
    .agg-layout { flex-direction:column; }
    .sheet-tabs {
      flex:0 0 auto; width:auto; flex-direction:row; flex-wrap:wrap;
      gap:6px; border-right:none; border-bottom:2px solid #e5ebf3;
      border-radius:0;
    }
    .sheet-tabs .nav-section { width:100%; padding:6px 4px 2px; }
    .sheet-tabs .nav-item { width:auto; }
    .sheet-tabs .nav-link .badge { margin-left:6px; }
  }
  .summary-strip { background:#fff; padding:12px 18px; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .category-block {
    background:#fff; border-radius:10px; margin-bottom:18px;
    box-shadow:0 1px 4px rgba(0,0,0,0.06); border-left:5px solid #1F3864;
  }
  .category-head {
    padding:12px 18px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid #eef2f7;
  }
  .category-key { background:#1F3864; color:#fff; font-weight:700; border-radius:6px; padding:3px 10px; font-family:monospace; }
  .category-name { font-weight:700; color:#1F3864; font-size:1.05rem; }
  .badge-code { background:#fff3cd; color:#856404; font-family:monospace; font-size:.72rem; padding:2px 6px; border-radius:3px; }
  .total-strip {
    margin-left:auto; display:flex; gap:10px; align-items:center;
    font-size:.85rem;
  }
  .total-krw { font-weight:700; color:#a05a00; }
  .rows-table { font-size:.84rem; margin:0; }
  .rows-table th { background:#f5f8ff; color:#1F3864; font-weight:600; padding:8px 10px; }
  .rows-table td { padding:6px 10px; vertical-align:middle; }
  .num { text-align:right; font-family:'Courier New',monospace; }
  .num-krw { color:#1F3864; font-weight:600; }
  .badge-cur { background:#fff3cd; color:#856404; font-family:monospace; font-size:.72rem; padding:2px 6px; border-radius:3px; }
  .empty-state { text-align:center; padding:48px 24px; color:#6c757d; }
  .empty-state .bi { font-size:3rem; color:#9aa9bd; }
  .errors-block { background:#fff8e1; border:1px solid #ffe082; border-radius:10px; padding:14px 18px; margin-bottom:14px; }
</style>
</head>
<body>

{% set active_menu = 'note_aggregate' %}
{% include '_sidebar.html' %}

{% include '_topbar.html' %}

<div class="container-fluid px-4 pb-5">

  <!-- 결산기간 -->
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-calendar3"></i><span>결산기간</span>
      <span class="badge bg-light text-dark ms-2 fw-normal" style="font-size:.72rem;">주석은 4분기에만 작성</span>
    </div>
    <div class="card-body">
      <div class="d-flex align-items-center gap-3 flex-wrap">
        <select id="yearSelect" class="form-select" style="max-width:240px;">
          {% for y in years %}
          <option value="{{ y }}" {% if y == year %}selected{% endif %}>{{ y }}</option>
          {% endfor %}
        </select>
        <span class="text-muted small">선택한 분기의 업로드된 모든 패키지를 합산합니다.</span>
        <button id="downloadAllBtn" class="btn btn-success btn-sm" onclick="downloadAll()">
          <i class="bi bi-file-earmark-excel me-1"></i>전체 합산 다운로드 (시트별 통합)
        </button>
        <span class="badge bg-light text-dark border ms-auto">
          <i class="bi bi-archive me-1"></i><span id="fileCount">-</span>개 패키지
        </span>
      </div>
      <div id="downloadAllStatus" class="small text-muted mt-2"></div>
    </div>
  </div>

  <!-- 합산 항목 -->
  <div class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
      <i class="bi bi-list-check"></i><span>합산 항목</span>
    </div>
    <div class="card-body p-0">
      <div class="agg-layout">
      <ul class="nav sheet-tabs" id="sheetTabs" role="tablist">
        <li class="nav-section">부채 · 퇴직급여 · 약정</li>
        <li class="nav-item">
          <button class="nav-link active" data-sheet="L1" type="button"
                  onclick="selectSheet('L1')">
            <i class="bi bi-bank me-1"></i>L1 단기차입금<span class="badge">1</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="L2" type="button"
                  onclick="selectSheet('L2')">
            <i class="bi bi-calendar-range me-1"></i>L2 만기별 금융부채<span class="badge">3</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="L3" type="button"
                  onclick="selectSheet('L3')">
            <i class="bi bi-people-fill me-1"></i>L3 퇴직급여<span class="badge">4</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="L31" type="button"
                  onclick="selectSheet('L31')">
            <i class="bi bi-person-vcard me-1"></i>L3-1 확정급여부채<span class="badge">6</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="L4" type="button"
                  onclick="selectSheet('L4')">
            <i class="bi bi-journal-text me-1"></i>L4 약정·보증·소송<span class="badge">12</span>
          </button>
        </li>
        <li class="nav-section">자산 · 손익</li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A2" type="button"
                  onclick="selectSheet('A2')">
            <i class="bi bi-graph-up me-1"></i>A2 유가증권<span class="badge">1</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A3" type="button"
                  onclick="selectSheet('A3')">
            <i class="bi bi-building me-1"></i>A3 투자부동산<span class="badge">3</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A4" type="button"
                  onclick="selectSheet('A4')">
            <i class="bi bi-bricks me-1"></i>A4 건설계약<span class="badge">3</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A5" type="button"
                  onclick="selectSheet('A5')">
            <i class="bi bi-key me-1"></i>A5 리스<span class="badge">2</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A6" type="button"
                  onclick="selectSheet('A6')">
            <i class="bi bi-diagram-3 me-1"></i>A6 파생상품<span class="badge">1</span>
          </button>
        </li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="A7" type="button"
                  onclick="selectSheet('A7')">
            <i class="bi bi-people me-1"></i>A7 지분법투자<span class="badge">1</span>
          </button>
        </li>
        <li class="nav-section">법인세</li>
        <li class="nav-item">
          <button class="nav-link" data-sheet="TX" type="button"
                  onclick="selectSheet('TX')">
            <i class="bi bi-receipt me-1"></i>TX 법인세<span class="badge">6</span>
          </button>
        </li>
      </ul>

      <!-- L1 탭 -->
      <div class="sheet-tab-content">
        <div class="sheet-pane" id="tabL1">
          <div class="agg-list-group">
            <button type="button" class="agg-item" id="aggL1B"
                    onclick="selectAgg('l1-borrowings')">
              <span class="agg-key">L1</span>
              <i class="bi bi-bank agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">단기차입금 명세</div>
                <div class="agg-desc">차입금 종류별 회사 명세 합산 (로컬통화 + KRW 환산).</div>
              </div>
            </button>
          </div>
        </div>

        <!-- L2 탭 -->
        <div class="sheet-pane" id="tabL2" style="display:none;">
          <div class="agg-list-group">
            <button type="button" class="agg-item" id="aggL2LTB"
                    onclick="selectAgg('l2-long-term-borrowings')">
              <span class="agg-key">1</span>
              <i class="bi bi-bank2 agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">장기차입금 (유동성 포함)</div>
                <div class="agg-desc">대주구분·대주명·이자율·유동/비유동·합계 명세 (행 추가 안전).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL2DEB"
                    onclick="selectAgg('l2-debentures')">
              <span class="agg-key">2</span>
              <i class="bi bi-file-earmark-text agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">사채 (유동성 사채 포함)</div>
                <div class="agg-desc">종류·주관사·이자율·유동/비유동·합계 명세 (행 추가 안전).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL2MAT"
                    onclick="selectAgg('l2-maturity-analysis')">
              <span class="agg-key">3</span>
              <i class="bi bi-hourglass-split agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">부채성 금융상품 만기 분석</div>
                <div class="agg-desc">계정명·대주구분 × 1년 미만 / 1~2년 / 2~5년 / 5년 초과 / 합계.</div>
              </div>
            </button>
          </div>
        </div>

        <!-- L3 탭 -->
        <div class="sheet-pane" id="tabL3" style="display:none;">
          <div class="agg-list-group">
            <button type="button" class="agg-item" id="aggL3SV"
                    onclick="selectAgg('l3-severance')">
              <span class="agg-key">1</span>
              <i class="bi bi-person-walking-arrow-right agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">퇴직급여충당부채의 변동</div>
                <div class="agg-desc">기초·설정액·지급액·전출입·사업결합·기타·기말 항목별 합산 (Avg 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL3PM"
                    onclick="selectAgg('l3-pension-movement')">
              <span class="agg-key">2</span>
              <i class="bi bi-arrow-repeat agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">퇴직연금운용자산의 변동</div>
                <div class="agg-desc">기초·적립액·지급액·이자수익·전출입·사업결합·기타·기말 (Avg 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL3PB"
                    onclick="selectAgg('l3-pension-breakdown')">
              <span class="agg-key">3</span>
              <i class="bi bi-pie-chart agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">퇴직연금운용자산의 구성내역</div>
                <div class="agg-desc">현금·예금·주식·채권·기타 자산종류별 합산 (Spot 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL3MG"
                    onclick="selectAgg('l3-pension-managers')">
              <span class="agg-key">4</span>
              <i class="bi bi-building agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">퇴직연금운용자산의 운용사</div>
                <div class="agg-desc">운용사명별 금액 명세 (행 추가 안전, Spot 환율).</div>
              </div>
            </button>
          </div>
        </div>

        <!-- L3-1 탭 -->
        <div class="sheet-pane" id="tabL31" style="display:none;">
          <div class="agg-list-group">
            <button type="button" class="agg-item" id="aggL31DBO"
                    onclick="selectAgg('l31-dbo')">
              <span class="agg-key">1</span>
              <i class="bi bi-arrow-down-up agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">확정급여채무의 변동</div>
                <div class="agg-desc">기초·근무원가·이자비용·재측정·가정변동·경험조정·지급·기말 (Avg 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL31PA"
                    onclick="selectAgg('l31-plan-asset')">
              <span class="agg-key">2</span>
              <i class="bi bi-arrow-repeat agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">사외적립자산의 공정가치 변동</div>
                <div class="agg-desc">기초·이자수익·제도자산 손익·기여금·지급·기말 (Avg 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL31AS"
                    onclick="selectAgg('l31-assumptions')">
              <span class="agg-key">3</span>
              <i class="bi bi-bullseye agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">보험수리적 평가 가정치 (최저/최고)</div>
                <div class="agg-desc">합산 안 함. 기대임금상승률·할인율 각각 최저 / 최고 입력 회사 표시.</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL31SEN"
                    onclick="selectAgg('l31-sensitivity')">
              <span class="agg-key">4</span>
              <i class="bi bi-sliders agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">보험수리적 가정의 변동 영향</div>
                <div class="agg-desc">기대임금상승율·할인율 × 1% 상승/하락 영향 (Spot 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL31PB"
                    onclick="selectAgg('l31-plan-breakdown')">
              <span class="agg-key">5</span>
              <i class="bi bi-pie-chart-fill agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">사외적립자산의 구성내역</div>
                <div class="agg-desc">현금·예금·주식·채권·기타 자산종류별 합산 (Spot 환율).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL31MG"
                    onclick="selectAgg('l31-plan-managers')">
              <span class="agg-key">6</span>
              <i class="bi bi-building-fill agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">사외적립자산의 운용사</div>
                <div class="agg-desc">운용사명별 금액 명세 (행 추가 안전, Spot 환율).</div>
              </div>
            </button>
          </div>
        </div>

        <!-- L4 탭 -->
        <div class="sheet-pane" id="tabL4" style="display:none;">
          <div class="agg-list-group">
            <button type="button" class="agg-item" id="aggL4LF"
                    onclick="selectAgg('l4-loan-facility')">
              <span class="agg-key">1-1</span>
              <i class="bi bi-shield-check agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">대출한도 약정</div>
                <div class="agg-desc">금융기관별 약정 한도 명세 (행 추가 안전).</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL4LC"
                    onclick="selectAgg('l4-lc')">
              <span class="agg-key">2</span>
              <i class="bi bi-receipt agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">수입신용장 / 미확정 지급보증</div>
                <div class="agg-desc">2번(L/C 오픈) + 2-1번(미확정 지급보증) 회사별 한 줄.</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL4EXP"
                    onclick="selectAgg('l4-export')">
              <span class="agg-key">3</span>
              <i class="bi bi-cash-stack agg-icon"></i>
              <div class="flex-grow-1">
                <div class="agg-title">수출채권 할인</div>
                <div class="agg-desc">3번(할인 여부) + 3-1번(만기 미도래 할인금액) 회사별 한 줄.</div>
              </div>
            </button>
            <button type="button" class="agg-item" id="aggL4GR"
                    onclick="selectAgg('l4-guarantees-received')">
              <span class="agg-key">4-1</span>

<script>
let selected = null;
let __fileCount = 0;

function estimatedSeconds(n) {
  if (!n) return 0;
  return Math.max(3, Math.ceil(n / 8 * 1.5));
}

async function downloadAll() {
  const year = document.getElementById('yearSelect').value;
  const btn = document.getElementById('downloadAllBtn');
  const status = document.getElementById('downloadAllStatus');
  if (!confirm(`${year} 결산기간의 모든 주석합산을 단일 엑셀로 생성합니다.\n` +
               '24개 합산을 순차 실행하므로 시간이 소요됩니다 (약 1-3분).\n계속할까요?')) {
    return;
  }
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>전체 합산 생성 중...';
  status.innerHTML = '<i class="bi bi-hourglass-split me-1"></i>모든 합산 항목을 순차 실행 중입니다. 페이지를 닫지 마세요.';

  try {
    const res = await fetch(`/admin/note-aggregate/all-in-one?year=${encodeURIComponent(year)}`);
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || '생성 실패');
    const sheetN = data.sheets_count || data.sections_count;
    status.innerHTML = `<i class="bi bi-check-circle text-success me-1"></i>완료 — ${sheetN}개 시트 (표지 포함) / ${data.elapsed_seconds}초 소요.${data.excel_filename ? ` 파일명: <code>${escHtml(data.excel_filename)}</code>` : ''}`;
    // 자동 다운로드
    if (data.download_url) {
      const a = document.createElement('a');
      a.href = data.download_url;
      a.download = data.excel_filename || '주석합산_전체.xlsx';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  } catch (e) {
    status.innerHTML = `<i class="bi bi-exclamation-triangle text-danger me-1"></i>실패: ${escHtml(e.message)}`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
}

async function refreshFileCount() {
  const year = document.getElementById('yearSelect').value;
  try {
    const res = await fetch('/files?year=' + encodeURIComponent(year));
    const arr = await res.json();
    __fileCount = Array.isArray(arr) ? arr.length : 0;
  } catch (e) { __fileCount = 0; }
  document.getElementById('fileCount').textContent = __fileCount || '?';
}

function selectSheet(sheet) {
  document.querySelectorAll('.sheet-tabs .nav-link').forEach(el => {
    el.classList.toggle('active', el.dataset.sheet === sheet);
  });
  document.querySelectorAll('.sheet-pane').forEach(el => {
    el.style.display = 'none';
  });
  const target = document.getElementById('tab' + sheet);
  if (target) target.style.display = 'block';
}

function selectAgg(kind) {
  selected = kind;
  document.querySelectorAll('.agg-item').forEach(el => el.classList.remove('active'));
  const id = AGG_ITEM_ID[kind];
  if (id) document.getElementById(id).classList.add('active');
  document.getElementById('runBtn').disabled = false;
  document.getElementById('runHint').textContent = '결산기간을 확인하고 [합산 실행]을 누르세요.';
}

function fmtNum(v, digits) {
  if (v == null || v === '' || isNaN(v)) return '';
  return Number(v).toLocaleString('en-US', { maximumFractionDigits: digits ?? 2 });
}
function escHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

  if (!selected) return;

    <div class="text-center py-5 text-muted">
      <div class="spinner-border text-primary mb-2"></div>
      <div>패키지 파일 스캔 중...</div>
      ${__fileCount ? `<div class="text-muted small mt-2">${__fileCount}개 패키지 · 병렬 8개씩 · 약 ${est}초 예상</div>` : ''}
    </div>`;

      </span>

  const byCur = data.total_by_currency || {};
  const curKeys = Object.keys(byCur).sort();
  const curBlock = curKeys.length
    ? `<div class="category-block">
         <div class="category-head">
           <span class="category-key">통화</span>
           <span class="category-name">통화별 로컬/KRW 합계</span>
         </div>
         <div class="table-responsive">
           <table class="table rows-table table-hover mb-0">

               <th>통화</th><th class="num">로컬 합계</th><th class="num">KRW 합계</th>
             </tr></thead>
             <tbody>
               ${curKeys.map(cur => `<tr>
                 <td><span class="badge-cur">${escHtml(cur)}</span></td>
                 <td class="num">${fmtNum(byCur[cur].local, 0)}</td>

               </tr>`).join('')}
             </tbody>
           </table>
         </div>

  if (!rows.length) {

        <h5 class="mt-2 mb-1">합산할 데이터가 없습니다</h5>
        <p class="mb-0">${escHtml(opts.emptyMsg)}</p>
      </div></div>`;
    return;
  }

  const renderCell = (col, r) => {
    const v = r[col.key];
    if (col.type === 'currency') {
      return `<td>${v ? `<span class="badge-cur">${escHtml(v)}</span>` : ''}</td>`;
    }
    if (col.type === 'num') {
      return `<td class="num">${v == null ? '' : fmtNum(v, 2)}</td>`;
    }
    if (col.type === 'spot') {
      return `<td class="num text-muted">${v ? fmtNum(v, 4) : ''}</td>`;
    }
    if (col.type === 'krw') {
      return `<td class="num num-krw">${v == null ? '' : fmtNum(v, 0)}</td>`;
    }
    return `<td>${escHtml(v ?? '')}</td>`;
  };

  const detailBlock = `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key">${escHtml(opts.sectionKey)}</span>

        </table>

    </div>`;

  area.innerHTML = summary + errBlock + curBlock + detailBlock;
}

        <h5 class="mt-2 mb-1">입력된 데이터가 없습니다</h5>
        <p class="mb-0">TX 시트 1번 이연법인세 증감내용에 값을 입력한 회사가 없습니다.</p>
      </div></div>`;
    return;
  }

  const catBlock = `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key">1</span>
        <span class="category-name">카테고리별 합계 (계정명 × Current/Non-Current, 기초=전기말 Spot / 기말=당기말 Spot)</span>
      </div>
      <div class="table-responsive">
        <table class="table rows-table table-hover mb-0">
          <thead><tr>
            <th>계정명</th><th>유동/비유동</th>
            <th class="num">회사수</th>
            <th class="num">기초 KRW</th><th class="num">기말 KRW</th>
            <th class="num">증감 KRW</th>
          </tr></thead>
          <tbody>
            ${cats.map(c => `<tr>
              <td>${escHtml(c.kor_label)}</td>
              <td><span class="badge ${c.current_flag === 'Current' ? 'bg-info' : 'bg-secondary'}">${escHtml(c.current_flag || '-')}</span></td>
              <td class="num">${fmtNum(c.company_count, 0)}</td>
              <td class="num">${fmtNum(c.beginning_krw, 0)}</td>
              <td class="num num-krw">${fmtNum(c.ending_krw, 0)}</td>
              <td class="num">${fmtNum(c.change_krw, 0)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  const detailBlock = companyRows.length
    ? `<div class="category-block">
         <div class="category-head">
           <span class="category-key">상세</span>
           <span class="category-name">회사별 항목 명세</span>
         </div>
         <div class="table-responsive">
           <table class="table rows-table table-hover mb-0">
             <thead><tr>
               <th>회사</th><th>통화</th>
               <th>계정명</th><th>유동/비유동</th>
               <th class="num">기초(로컬)</th><th class="num">기말(로컬)</th>
               <th class="num">증감(로컬)</th>
               <th class="num">전기말 Spot</th><th class="num">당기말 Spot</th>
               <th class="num">기초(KRW)</th><th class="num">기말(KRW)</th>
               <th class="num">증감(KRW)</th>
               <th class="num">법정세율</th>
               <th class="num">기초 일시적차이</th><th class="num">기말 일시적차이</th>
             </tr></thead>
             <tbody>
               ${companyRows.map(r => `<tr>
                 <td>${escHtml(r.company)}</td>
                 <td><span class="badge-cur">${escHtml(r.currency)}</span></td>
                 <td>${escHtml(r.kor_label)}</td>
                 <td>${escHtml(r.current_flag || '-')}</td>
                 <td class="num">${fmtNum(r.local_beginning, 0)}</td>
                 <td class="num">${fmtNum(r.local_ending, 0)}</td>
                 <td class="num">${fmtNum(r.local_change, 0)}</td>
                 <td class="num text-muted">${r.prior_spot ? fmtNum(r.prior_spot, 4) : ''}</td>
                 <td class="num text-muted">${r.spot ? fmtNum(r.spot, 4) : ''}</td>
                 <td class="num">${fmtNum(r.krw_beginning, 0)}</td>
                 <td class="num num-krw">${fmtNum(r.krw_ending, 0)}</td>
                 <td class="num">${fmtNum(r.krw_change, 0)}</td>
                 <td class="num text-muted">${(r.statutory_rate || r.statutory_rate === 0) ? (r.statutory_rate * 100).toFixed(2) + '%' : ''}</td>
                 <td class="num">${(r.beginning_temp_diff || r.beginning_temp_diff === 0) ? fmtNum(r.beginning_temp_diff, 0) : ''}</td>
                 <td class="num">${(r.ending_temp_diff || r.ending_temp_diff === 0) ? fmtNum(r.ending_temp_diff, 0) : ''}</td>
               </tr>`).join('')}
             </tbody>
           </table>
         </div>
       </div>`
    : '';

  area.innerHTML = summary + _txErrBlock(data) + catBlock + detailBlock;
}

function renderTXReconciliation(data) {
  // TX 4 — pivot + 회사별 유효세율 표시
  const area = document.getElementById('resultArea');
  const rows = data.rows || [];
  const totals = data.totals_by_item_krw || {};
  const itemPairs = [
    ['pretax_income',       '세전순이익'],
    ['tax_at_statutory',    '적용세율 산출세액'],
    ['permanent_diff',      '영구적차이'],
    ['tax_credit',          '세액공제'],
    ['additional_refund',   '추납액/환급액'],
    ['unrecognized_change', '미인식 일시적차이 변동'],
    ['total_expense',       '법인세비용'],
  ];

  const summary = `
    <div class="summary-strip mb-3 d-flex flex-wrap align-items-center gap-3">
      <span><i class="bi bi-archive me-1"></i>스캔 <strong>${data.scanned}</strong>개사</span>
      <span><i class="bi bi-pencil-square me-1"></i>입력 <strong>${data.with_data_count || 0}</strong>개사</span>
      <span><i class="bi bi-coin-fill me-1 text-warning"></i>법인세비용 KRW <strong class="text-warning">${fmtNum(totals.total_expense, 0)}</strong></span>
      <span class="ms-auto d-flex align-items-center gap-2">
        <span class="text-muted small">결산기간: ${escHtml(data.year)}</span>
        ${_txDlBtn(data)}
      </span>
    </div>`;

  const totalsBlock = `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key">합계</span>
        <span class="category-name">항목별 KRW 합계 (Avg 환율)</span>
      </div>
      <div class="table-responsive">
        <table class="table rows-table table-hover mb-0">
          <thead><tr>${itemPairs.map(([_, lbl]) => `<th class="num">${escHtml(lbl)}</th>`).join('')}</tr></thead>
          <tbody><tr>${itemPairs.map(([k, _]) => `<td class="num ${k === 'total_expense' ? 'num-krw' : ''}">${fmtNum(totals[k] || 0, 0)}</td>`).join('')}</tr></tbody>
        </table>
      </div>
    </div>`;

  if (!rows.length) {
    area.innerHTML = summary + _txErrBlock(data) + `
      <div class="card"><div class="empty-state">
        <i class="bi bi-inbox"></i>
        <h5 class="mt-2 mb-1">입력된 데이터가 없습니다</h5>
        <p class="mb-0">TX 시트 4번 reconciliation에 값을 입력한 회사가 없습니다.</p>
      </div></div>`;
    return;
  }

  const fmtPct = v => (v == null ? '—' : (Number(v) * 100).toFixed(2) + '%');

  const gs = data.group_subtotals || [];
  const groupBlock = gs.length ? `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key"><i class="bi bi-diagram-3"></i></span>
        <span class="category-name">연결그룹별 KRW 합계</span>
      </div>
      <div class="table-responsive">
        <table class="table rows-table table-hover mb-0">
          <thead><tr>
            <th>연결그룹</th><th class="num">회사수</th>
            ${itemPairs.map(([_, lbl]) => `<th class="num">${escHtml(lbl)}</th>`).join('')}
            <th class="num">유효세율</th>
          </tr></thead>
          <tbody>
            ${gs.map(g => {
              const k = g.krw || {};
              const eff = k.pretax_income ? (k.total_expense / k.pretax_income) : null;
              return `<tr>
                <td><strong>${escHtml(g.group)}</strong></td>
                <td class="num">${fmtNum(g.company_count, 0)}</td>
                ${itemPairs.map(([key, _]) => `<td class="num ${key==='total_expense'?'num-krw':''}">${fmtNum(k[key] || 0, 0)}</td>`).join('')}
                <td class="num"><strong>${fmtPct(eff)}</strong></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>` : '';

  const detailBlock = `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key">4</span>
        <span class="category-name">회사별 명세 — 유효세율 포함</span>
      </div>
      <div class="table-responsive">
        <table class="table rows-table table-hover mb-0">
          <thead><tr>
            <th>회사</th><th>통화</th>
            ${itemPairs.map(([_, lbl]) => `<th class="num">${escHtml(lbl)}<br><small>(로컬)</small></th>`).join('')}
            <th class="num">Avg</th>
            <th class="num">법인세비용<br><small>(KRW)</small></th>
            <th class="num">유효세율</th>
          </tr></thead>
          <tbody>
            ${rows.map(r => `<tr>
              <td>${escHtml(r.company)}</td>
              <td><span class="badge-cur">${escHtml(r.currency)}</span></td>
              ${itemPairs.map(([k, _]) => `<td class="num">${fmtNum(r['local_'+k] || 0, 0)}</td>`).join('')}
              <td class="num text-muted">${r.spot ? fmtNum(r.spot, 4) : ''}</td>
              <td class="num num-krw">${fmtNum(r.krw_total_expense || 0, 0)}</td>
              <td class="num"><strong>${fmtPct(r.effective_rate)}</strong></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  area.innerHTML = summary + _txErrBlock(data) + totalsBlock + groupBlock + detailBlock;
}

function renderTXLossMaturity(data) {
  // TX 5-1 — 만기 buckets
  const area = document.getElementById('resultArea');
  const buckets = data.buckets || [];
  const companyRows = data.company_rows || [];

  const summary = `
    <div class="summary-strip mb-3 d-flex flex-wrap align-items-center gap-3">
      <span><i class="bi bi-archive me-1"></i>스캔 <strong>${data.scanned}</strong>개사</span>
      <span><i class="bi bi-pencil-square me-1"></i>입력 <strong>${data.with_data_count || 0}</strong>개사</span>
      <span><i class="bi bi-coin-fill me-1 text-warning"></i>전체 KRW <strong class="text-warning">${fmtNum(data.grand_total_krw, 0)}</strong></span>
      <span class="ms-auto d-flex align-items-center gap-2">
        <span class="text-muted small">결산기간: ${escHtml(data.year)}</span>
        ${_txDlBtn(data)}
      </span>
    </div>`;

  if (!buckets.length) {
    area.innerHTML = summary + _txErrBlock(data) + `
      <div class="card"><div class="empty-state">
        <i class="bi bi-inbox"></i>
        <h5 class="mt-2 mb-1">입력된 데이터가 없습니다</h5>
        <p class="mb-0">TX 시트 5-1번 이월결손금 만기에 값을 입력한 회사가 없습니다.</p>
      </div></div>`;
    return;
  }

  const bucketBlock = `
    <div class="category-block">
      <div class="category-head">
        <span class="category-key">5-1</span>
        <span class="category-name">만기별 합계 (Spot 환율)</span>
      </div>
      <div class="table-responsive">
        <table class="table rows-table table-hover mb-0">
          <thead><tr><th>만기</th><th class="num">회사수</th><th class="num">KRW 합계</th></tr></thead>
          <tbody>
            ${buckets.map(b => `<tr>
              <td>${escHtml(b.label)}</td>
              <td class="num">${fmtNum(b.company_count, 0)}</td>
              <td class="num num-krw">${fmtNum(b.total_krw, 0)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  // 회사별 명세 - bucket label은 회사마다 다를 수 있어 union of labels 사용
  const labelSet = new Set();
  companyRows.forEach(r => (r.buckets || []).forEach(b => labelSet.add(b.label)));
  const labels = buckets.map(b => b.label)
    .concat([...labelSet].filter(l => !buckets.find(b => b.label === l)));

  const detailBlock = companyRows.length
    ? `<div class="category-block">
         <div class="category-head">
           <span class="category-key">상세</span>
           <span class="category-name">회사별 만기 명세</span>
         </div>
         <div class="table-responsive">
           <table class="table rows-table table-hover mb-0">
             <thead><tr>
               <th>회사</th><th>통화</th>
               ${labels.map(l => `<th class="num">${escHtml(l)}<br><small>(KRW)</small></th>`).join('')}
             </tr></thead>
             <tbody>
               ${companyRows.map(r => {
                 const bd = {};
                 (r.buckets || []).forEach(b => bd[b.label] = b);
                 return `<tr>
                   <td>${escHtml(r.company)}</td>
                   <td><span class="badge-cur">${escHtml(r.currency)}</span></td>
                   ${labels.map(l => `<td class="num">${fmtNum((bd[l] || {}).krw || 0, 0)}</td>`).join('')}
                 </tr>`;
               }).join('')}
             </tbody>
           </table>
         </div>
       </div>`
    : '';

  area.innerHTML = summary + _txErrBlock(data) + bucketBlock + detailBlock;
}

document.getElementById('yearSelect').addEventListener('change', () => {
  document.getElementById('resultArea').innerHTML = '';
  refreshFileCount();
});

refreshFileCount();
</script>
